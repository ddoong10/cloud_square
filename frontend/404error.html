<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-size: 6rem;
      font-weight: 700;
      color: #1a73e8;
      line-height: 1;
    }
    .message {
      font-size: 1.25rem;
      color: #666;
      margin-top: 0.5rem;
    }
    .link {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.6rem 1.5rem;
      background: #1a73e8;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-size: 0.95rem;
    }
    .link:hover { background: #1557b0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <p class="message">요청하신 페이지를 찾을 수 없습니다.</p>
    <a class="link" href="https://lms.uoscholar-server.store">메인으로 돌아가기</a>
  </div>
</body>
</html>
