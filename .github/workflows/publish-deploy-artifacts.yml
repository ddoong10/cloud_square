name: build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build deploy artifact
        run: |
          chmod +x backend/gradlew
          chmod +x scripts/package-deploy.sh
          ./scripts/package-deploy.sh

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: lms-was-deploy-${{ github.sha }}
          path: dist/lms-was-deploy.tar.gz
          retention-days: 14
