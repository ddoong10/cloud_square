name: publish-deploy-artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build deploy artifacts
        run: |
          chmod +x backend/gradlew
          chmod +x scripts/package-deploy.sh
          ./scripts/package-deploy.sh

      - name: Install AWS SDK for JavaScript v2.348.0
        run: |
          npm install --no-save aws-sdk@2.348.0

      - name: Publish WAS artifact to NCP Object Storage
        env:
          NCP_DEPLOY_ACCESS_KEY: ${{ secrets.NCP_DEPLOY_ACCESS_KEY }}
          NCP_DEPLOY_SECRET_KEY: ${{ secrets.NCP_DEPLOY_SECRET_KEY }}
          NCP_S3_REGION: ${{ secrets.NCP_S3_REGION }}
          NCP_S3_ENDPOINT: ${{ secrets.NCP_S3_ENDPOINT }}
          NCP_DEPLOY_BUCKET: ${{ secrets.NCP_DEPLOY_BUCKET }}
          NCP_DEPLOY_PREFIX: ${{ secrets.NCP_DEPLOY_PREFIX }}
          GIT_SHA: ${{ github.sha }}
        run: |
          node scripts/upload-to-ncp-s3.js

      - name: Upload frontend to CDN bucket
        env:
          NCP_DEPLOY_ACCESS_KEY: ${{ secrets.NCP_DEPLOY_ACCESS_KEY }}
          NCP_DEPLOY_SECRET_KEY: ${{ secrets.NCP_DEPLOY_SECRET_KEY }}
          NCP_S3_REGION: ${{ secrets.NCP_S3_REGION }}
          NCP_S3_ENDPOINT: ${{ secrets.NCP_S3_ENDPOINT }}
          NCP_CDN_BUCKET: ${{ secrets.NCP_CDN_BUCKET }}
          NCP_CDN_PREFIX: ${{ secrets.NCP_CDN_PREFIX }}
        run: |
          node scripts/upload-frontend-cdn.js

      - name: Upload artifacts to GitHub (optional)
        uses: actions/upload-artifact@v4
        with:
          name: deploy-artifacts-${{ github.sha }}
          path: |
            dist/lms-was-deploy.tar.gz
